name: 🚀 Optimized CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Global environment variables
env:
  NODE_VERSION: '20'
  CACHE_KEY_PREFIX: 'v1'

# Cancel in-progress runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Detect changes for conditional execution
  detect-changes:
    name: 📋 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      src-changed: ${{ steps.changes.outputs.src }}
      tests-changed: ${{ steps.changes.outputs.tests }}
      docs-changed: ${{ steps.changes.outputs.docs }}
      config-changed: ${{ steps.changes.outputs.config }}
      dependencies-changed: ${{ steps.changes.outputs.dependencies }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect file changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            src:
              - 'src/**'
              - 'components.json'
            tests:
              - 'tests/**'
              - 'vitest.config.ts'
              - 'playwright.config.ts'
            docs:
              - '*.md'
              - 'docs/**'
            config:
              - '*.config.*'
              - '.github/**'
              - 'tsconfig.json'
              - 'eslint.config.js'
            dependencies:
              - 'package.json'
              - 'package-lock.json'

  # Job 2: Install dependencies with caching
  install:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dependencies-changed == 'true' || needs.detect-changes.outputs.src-changed == 'true' || needs.detect-changes.outputs.tests-changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v3
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ env.CACHE_KEY_PREFIX }}-node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Cache Playwright browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ env.CACHE_KEY_PREFIX }}-playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

  # Job 3: Code quality checks
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    needs: [detect-changes, install]
    if: needs.detect-changes.outputs.src-changed == 'true' || needs.detect-changes.outputs.config-changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ env.CACHE_KEY_PREFIX }}-node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Upload lint results
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: lint-results
          path: |
            eslint-report.json
            tsc-output.log

  # Job 4: Unit and Integration Tests
  test-unit:
    name: 🧪 Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, install]
    if: needs.detect-changes.outputs.src-changed == 'true' || needs.detect-changes.outputs.tests-changed == 'true'
    strategy:
      matrix:
        test-type: [unit, integration, component]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ env.CACHE_KEY_PREFIX }}-node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run ${{ matrix.test-type }} tests
        run: npm run test:${{ matrix.test-type }} -- --reporter=verbose --reporter=junit --outputFile=test-results/junit-${{ matrix.test-type }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.test-type }}
          path: test-results/

      - name: Upload coverage
        if: matrix.test-type == 'unit'
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Job 5: Build application
  build:
    name: 🏗️ Build Application
    runs-on: ubuntu-latest
    needs: [detect-changes, install]
    if: needs.detect-changes.outputs.src-changed == 'true' || needs.detect-changes.outputs.config-changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ env.CACHE_KEY_PREFIX }}-node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Cache Next.js build
        uses: actions/cache@v3
        with:
          path: |
            .next/cache
            .next/static
          key: ${{ env.CACHE_KEY_PREFIX }}-nextjs-${{ runner.os }}-${{ hashFiles('src/**/*', 'package-lock.json') }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-nextjs-${{ runner.os }}-

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            .next/
            public/
          retention-days: 1

      - name: Analyze bundle size
        run: |
          npx next-bundle-analyzer || echo "Bundle analyzer completed"

  # Job 6: E2E Tests
  test-e2e:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, install, build]
    if: needs.detect-changes.outputs.src-changed == 'true' || needs.detect-changes.outputs.tests-changed == 'true'
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1/3, 2/3, 3/3]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ env.CACHE_KEY_PREFIX }}-node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Restore Playwright browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ env.CACHE_KEY_PREFIX }}-playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts

      - name: Run E2E tests
        run: npx playwright test --project=${{ matrix.browser }} --shard=${{ matrix.shard }}
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: e2e-results-${{ matrix.browser }}-${{ strategy.job-index }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # Job 7: Security audit
  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: [detect-changes, install]
    if: needs.detect-changes.outputs.dependencies-changed == 'true' || needs.detect-changes.outputs.src-changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ env.CACHE_KEY_PREFIX }}-node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run npm audit
        run: npm audit --audit-level moderate

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v2
        with:
          languages: typescript, javascript

  # Job 8: Performance testing
  performance-test:
    name: ⚡ Performance Test
    runs-on: ubuntu-latest
    needs: [detect-changes, install, build]
    if: needs.detect-changes.outputs.src-changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ env.CACHE_KEY_PREFIX }}-node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # Job 9: Content validation
  validate-content:
    name: 📝 Validate Content
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.src-changed == 'true' || needs.detect-changes.outputs.docs-changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ env.CACHE_KEY_PREFIX }}-node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Validate content structure
        run: npm run content:validate

      - name: Check internal links
        run: npm run content:validate-links

  # Job 10: Final status check
  all-checks-passed:
    name: ✅ All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-unit, build, test-e2e, security-audit, performance-test, validate-content]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.lint-and-typecheck.result }}" == "failure" || 
                "${{ needs.test-unit.result }}" == "failure" || 
                "${{ needs.build.result }}" == "failure" || 
                "${{ needs.test-e2e.result }}" == "failure" || 
                "${{ needs.security-audit.result }}" == "failure" || 
                "${{ needs.performance-test.result }}" == "failure" || 
                "${{ needs.validate-content.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          else
            echo "All jobs passed successfully"
          fi

      - name: Report success
        if: success()
        run: echo "🎉 All CI checks passed successfully!"