name: Update AI Agents from AGENTS.md

on:
  push:
    branches: [main, master]
    paths: ['AGENTS.md']

permissions:
  contents: write

jobs:
  update-agents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read AGENTS.md content
        id: agents-config
        uses: jaywcjlove/github-action-read-file@main
        with:
          path: AGENTS.md

      - name: Parse and update agent files
        run: |
          # Parse AGENTS.md and extract agent configurations
          awk '
          BEGIN { 
            current_file = ""
            content = ""
            in_code_block = 0
          }
          
          /^## / {
            # Save previous file if exists
            if (current_file != "" && content != "") {
              print content > current_file
              close(current_file)
            }
            
            # Extract new file path from header
            gsub(/^## /, "")
            gsub(/`/, "")
            current_file = $0
            content = ""
            next
          }
          
          /^```
            in_code_block = !in_code_block
            if (!in_code_block && current_file != "") {
              next
            }
          }
          
          {
            if (current_file != "" && (in_code_block || !/^```/)) {
              if (content != "") content = content "\n"
              content = content $0
            }
          }
          
          END {
            # Save last file
            if (current_file != "" && content != "") {
              print content > current_file
              close(current_file)
            }
          }
          ' AGENTS.md

      - name: Ensure directories exist
        run: |
          # Create directories if they don't exist
          mkdir -p .github .idx .roo/rules
          
          # Set proper file contents if they were created
          if [ ! -f .github/copilot-instructions.md ]; then
            echo "# Copilot Instructions" > .github/copilot-instructions.md
          fi
          
          if [ ! -f .idx/dev.nix ]; then
            echo "# Dev environment configuration" > .idx/dev.nix
          fi
          
          if [ ! -f .idx/mcp.json ]; then
            echo "{}" > .idx/mcp.json
          fi
          
          if [ ! -f .roo/mcp.json ]; then
            echo "{}" > .roo/mcp.json
          fi

      - name: Validate updated files
        run: |
          echo "=== Updated files ==="
          for file in .github/copilot-instructions.md .idx/airules.md .idx/dev.nix .idx/mcp.json .roo/rules/general.md .roo/mcp.json; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
              echo "Content preview:"
              head -3 "$file" | sed 's/^/  /'
              echo ""
            else
              echo "⚠️  $file missing"
            fi
          done

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update AI agents from AGENTS.md"
          file_pattern: '.github/copilot-instructions.md .idx/airules.md .idx/dev.nix .idx/mcp.json .roo/rules/general.md .roo/mcp.json'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
